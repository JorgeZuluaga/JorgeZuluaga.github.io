<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>Post Instagram — Reseña</title>
  <link rel="icon" type="image/png" sizes="48x48" href="./assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --post-black: #181818;
      --post-white: #ffffff;
      --post-line: rgba(24, 24, 24, 0.12);
      --post-accent: #0e55af;
      --post-gold: #d4a017;
      --post-muted: rgba(24, 24, 24, 0.78);
      --post-width: 800px;
      --post-height: 1000px;
      --post-cover-width: 330px;
      --post-qr-size: 132px;
      --post-cover-qr-size: 100px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: #e8ecf2;
      color: var(--post-black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1.5rem 1.5rem 2rem;
    }

    .post-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
    }

    .post-hint {
      font-size: 0.9rem;
      color: rgba(24, 24, 24, 0.65);
      text-align: center;
      max-width: var(--post-width);
    }

    .post-caption-panel {
      width: var(--post-width);
      margin-top: 0.35rem;
      background: var(--post-white);
      border: 1px solid var(--post-line);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(24, 24, 24, 0.08);
      overflow: hidden;
      flex-shrink: 0;
    }

    .post-caption-panel__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid var(--post-line);
      background: rgba(14, 85, 175, 0.05);
    }

    .post-caption-panel__title {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--post-black);
    }

    .post-caption-panel__copy {
      border: 1px solid var(--post-line);
      background: #fff;
      color: var(--post-accent);
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }

    .post-caption-panel__copy:hover {
      background: rgba(14, 85, 175, 0.06);
    }

    .post-caption-panel__text {
      margin: 0;
      padding: 1.1rem 1.15rem 1.2rem;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--post-black);
      max-height: 520px;
      overflow: auto;
    }

    .post-canvas {
      width: var(--post-width);
      height: var(--post-height);
      min-height: var(--post-height);
      background: var(--post-white);
      border: 1px solid var(--post-line);
      border-radius: 4px;
      box-shadow: 0 18px 50px rgba(24, 24, 24, 0.12);
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      isolation: isolate;
    }

    .post-canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("./assets/fondo-posts.webp") center / cover no-repeat;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    .post-inner {
      width: 100%;
      height: 100%;
      min-height: var(--post-height);
      padding: 36px 44px 40px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .post-brand__handle {
      font-weight: 500;
      color: var(--post-muted);
      margin: 0;
    }

    /* —— Estilo square (QR en portada, logo arriba a la derecha) —— */
    .post-canvas--square .post-brand {
      float: right;
      width: 132px;
      margin: 0 0 0.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      text-align: center;
    }

    .post-canvas--square .post-brand__logo {
      width: 120px;
      height: 120px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
    }

    .post-canvas--square .post-brand__handle {
      font-size: 0.9rem;
      line-height: 1.25;
    }

    .post-canvas--square .post-header__intro::after {
      content: "";
      display: table;
      clear: both;
    }

    .post-canvas--square .post-cover-wrap {
      position: relative;
      float: left;
      width: var(--post-cover-width);
      margin: 0 1.25rem 0.85rem 0;
    }

    .post-canvas--square .post-cover {
      width: 100%;
      height: auto;
      border-radius: 10px;
      border: 1px solid var(--post-line);
      display: block;
      box-shadow: 0 8px 24px rgba(24, 24, 24, 0.08);
    }

    .post-canvas--square .post-cover-qr-stack {
      position: absolute;
      bottom: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .post-canvas--square .post-cover-qr-stack--left {
      left: 10px;
    }

    .post-canvas--square .post-cover-qr-stack--right {
      right: 10px;
    }

    .post-canvas--square .post-cover-qr {
      width: var(--post-cover-qr-size);
      height: var(--post-cover-qr-size);
      border-radius: 6px;
      border: 2px solid var(--post-white);
      background: var(--post-white);
      box-shadow: 0 4px 14px rgba(24, 24, 24, 0.28);
    }

    .post-canvas--square .post-cover-qr-label {
      margin: 0;
      padding: 0.2rem 0.45rem;
      font-size: 0.72rem;
      font-weight: 600;
      line-height: 1.2;
      color: var(--post-black);
      background: rgba(255, 255, 255, 0.94);
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(24, 24, 24, 0.15);
      white-space: nowrap;
    }

    .post-canvas--square .post-library-footer {
      margin-top: auto;
      padding-top: 0.85rem;
      border-top: 1px solid var(--post-line);
      text-align: center;
    }

    .post-canvas--square .post-library-link {
      font-size: 1.41rem;
      font-weight: 500;
      color: var(--post-black);
      text-decoration: none;
      line-height: 1.35;
    }

    /* —— Estilo complete (footer con QR y logo) —— */
    .post-canvas--complete .post-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 0.3rem;
      text-align: center;
      padding: 0 0.35rem 0.15rem;
    }

    .post-canvas--complete .post-brand__logo {
      width: 144px;
      height: 144px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
    }

    .post-canvas--complete .post-brand__handle {
      font-size: 0.9rem;
      line-height: 1.25;
    }

    .post-canvas--complete .post-cover {
      float: left;
      width: var(--post-cover-width);
      margin: 0 1.35rem 0.85rem 0;
      border-radius: 10px;
      border: 1px solid var(--post-line);
      display: block;
      box-shadow: 0 8px 24px rgba(24, 24, 24, 0.08);
    }

    .post-canvas--complete .post-footer {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--post-line);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: end;
    }

    .post-canvas--complete .post-footer > .post-qr-block,
    .post-canvas--complete .post-footer > .post-brand {
      justify-self: center;
    }

    .post-canvas--complete .post-qr-block {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .post-canvas--complete .post-qr-block--stacked {
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      text-align: center;
    }

    .post-canvas--complete .post-qr-caption {
      margin: 0;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--post-accent);
      line-height: 1.3;
      word-break: break-all;
    }

    .post-canvas--complete .post-qr-block img {
      width: var(--post-qr-size);
      height: var(--post-qr-size);
      border-radius: 8px;
      border: 1px solid var(--post-line);
      background: #fff;
      flex-shrink: 0;
    }

    .post-header {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .post-header__content {
      margin-top: auto;
      margin-bottom: auto;
      min-height: 0;
      flex-shrink: 1;
      overflow: hidden;
      width: 100%;
    }

    .post-header__intro {
      margin-bottom: 1rem;
    }

    .post-header__body {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .post-header__body::after {
      content: "";
      display: table;
      clear: both;
    }

    .post-hashtag {
      display: inline-block;
      margin: 0 0 0.55rem;
      padding: 0.32rem 0.95rem;
      border-radius: 999px;
      background: rgba(14, 85, 175, 0.1);
      color: var(--post-accent);
      font-size: 1.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1.25;
    }

    .post-title {
      font-size: 2.00rem;
      font-weight: 700;
      line-height: 1.28;
      letter-spacing: -0.01em;
      margin: 0;
      max-width: 100%;
    }

    .post-meta {
      margin-top: 0;
      font-size: 1.05rem;
      color: var(--post-muted);
    }

    .post-byline {
      display: block;
      font-style: italic;
      font-size: 1.3rem;
      line-height: 1.55;
      margin-bottom: 0.35rem;
    }

    .post-stars {
      color: var(--post-gold);
      letter-spacing: 0.05em;
      font-size: 2rem;
    }

    .post-excerpt {
      margin-top: 0.65rem;
    }

    .post-excerpt p {
      font-size: 1.3rem;
      line-height: 1.55;
      margin: 0;
      color: var(--post-black);
    }

    .post-status {
      width: var(--post-width);
      min-height: 320px;
      height: var(--post-height);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      font-size: 1.1rem;
      line-height: 1.5;
      color: var(--post-muted);
      position: relative;
      z-index: 1;
    }

    .post-status code {
      font-size: 0.95rem;
      background: rgba(14, 85, 175, 0.08);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }

    @media (max-width: 840px) {
      body {
        padding: 1rem 0.5rem 2rem;
      }

      .post-canvas,
      .post-status {
        transform: scale(calc((100vw - 1rem) / 800));
        transform-origin: top center;
      }

      .post-caption-panel {
        width: min(800px, calc(100vw - 1rem));
      }

      .post-shell {
        min-height: calc(1000px * ((100vw - 1rem) / 800) + 2rem);
      }
    }
  </style>
</head>
<body>
  <div class="post-shell">
    <div id="post-root" class="post-canvas post-status" role="status" aria-live="polite">
      Cargando reseña…
    </div>
    <section id="post-caption-panel" class="post-caption-panel" hidden aria-label="Texto para Instagram">
      <div class="post-caption-panel__head">
        <h2 class="post-caption-panel__title" id="post-caption-title">Texto para la publicación en Instagram</h2>
        <button type="button" class="post-caption-panel__copy" id="post-caption-copy">Copiar</button>
      </div>
      <pre id="post-caption-text" class="post-caption-panel__text"></pre>
    </section>
    <p class="post-hint" id="post-hint">
      Post 800×1000 px (4:5) — captura la tarjeta blanca para Instagram.
      Ejemplo: <code>post.html?bookid=8628849214&amp;style=square</code>
      · <code>qrget=false</code> oculta Buscalibre · <code>qrfull=false</code> oculta reseña · <code>notext</code> oculta el caption
    </p>
  </div>
  <script type="module" src="./assets/post-page.js"></script>
</body>
</html>
