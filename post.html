<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>Post Instagram — Reseña</title>
  <link rel="icon" type="image/png" sizes="48x48" href="./assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --post-black: #181818;
      --post-white: #ffffff;
      --post-line: rgba(24, 24, 24, 0.12);
      --post-accent: #0e55af;
      --post-gold: #d4a017;
      --post-muted: rgba(24, 24, 24, 0.78);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: #e8ecf2;
      color: var(--post-black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1.5rem 1.5rem 2rem;
    }

    .post-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
    }

    .post-hint {
      font-size: 0.9rem;
      color: rgba(24, 24, 24, 0.65);
      text-align: center;
      max-width: 1080px;
    }

    .post-caption-panel {
      width: 1080px;
      margin-top: 0.35rem;
      background: var(--post-white);
      border: 1px solid var(--post-line);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(24, 24, 24, 0.08);
      overflow: hidden;
      flex-shrink: 0;
    }

    .post-caption-panel__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid var(--post-line);
      background: rgba(14, 85, 175, 0.05);
    }

    .post-caption-panel__title {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--post-black);
    }

    .post-caption-panel__copy {
      border: 1px solid var(--post-line);
      background: #fff;
      color: var(--post-accent);
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }

    .post-caption-panel__copy:hover {
      background: rgba(14, 85, 175, 0.06);
    }

    .post-caption-panel__text {
      margin: 0;
      padding: 1.1rem 1.15rem 1.2rem;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--post-black);
      max-height: 520px;
      overflow: auto;
    }

    .post-canvas {
      width: 1080px;
      height: auto;
      max-height: 1350px;
      background: var(--post-white);
      border: 1px solid var(--post-line);
      border-radius: 4px;
      box-shadow: 0 18px 50px rgba(24, 24, 24, 0.12);
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      isolation: isolate;
    }

    .post-canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("./assets/fondo-posts.webp") center / cover no-repeat;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .post-inner {
      width: 100%;
      min-height: 0;
      padding: 40px 56px 48px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .post-topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      margin-bottom: 1.35rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--post-line);
      text-align: center;
    }

    .post-topbar__mark {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
    }

    .post-topbar__logo {
      width: 88px;
      height: 88px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
    }

    .post-topbar__name {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--post-black);
    }

    .post-topbar__handles {
      font-size: 1rem;
      font-weight: 500;
      color: var(--post-muted);
      text-align: center;
      line-height: 1.35;
      margin: 0;
    }

    .post-header {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 36px;
      align-items: start;
    }

    .post-cover {
      width: 340px;
      border-radius: 10px;
      border: 1px solid var(--post-line);
      display: block;
      box-shadow: 0 8px 24px rgba(24, 24, 24, 0.08);
    }

    .post-header__text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .post-hashtag {
      display: inline-block;
      margin: 0 0 0.6rem;
      padding: 0.32rem 0.95rem;
      border-radius: 999px;
      background: rgba(14, 85, 175, 0.1);
      color: var(--post-accent);
      font-size: 1.32rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1.25;
    }

    .post-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.28;
      letter-spacing: -0.01em;
      margin: 0;
    }

    .post-meta {
      margin-top: 0.65rem;
      font-size: 1.05rem;
      color: var(--post-muted);
    }

    .post-stars {
      color: var(--post-gold);
      letter-spacing: 0.05em;
      font-size: 1.05rem;
    }

    .post-byline {
      margin-top: 0.55rem;
      font-size: 1rem;
      font-style: italic;
      color: var(--post-muted);
    }

    .post-excerpt {
      margin-top: 0.85rem;
    }

    .post-excerpt p {
      font-size: 1.22rem;
      line-height: 1.55;
      margin: 0;
      color: var(--post-black);
    }

    .post-footer {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--post-line);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: end;
    }

    .post-qr-block {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .post-qr-block img {
      width: 108px;
      height: 108px;
      border-radius: 8px;
      border: 1px solid var(--post-line);
      background: #fff;
      flex-shrink: 0;
    }

    .post-qr-label {
      font-size: 0.92rem;
      line-height: 1.35;
      color: var(--post-muted);
    }

    .post-qr-sublabel {
      display: block;
      margin-top: 0.1rem;
    }

    .post-qr-link {
      display: block;
      margin-top: 0.35rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--post-accent);
      word-break: break-all;
      line-height: 1.3;
    }

    .post-qr-label strong {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      color: var(--post-black);
      margin-bottom: 0.15rem;
    }

    .post-status {
      width: 1080px;
      min-height: 320px;
      max-height: 1350px;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      font-size: 1.1rem;
      line-height: 1.5;
      color: var(--post-muted);
      position: relative;
      z-index: 1;
    }

    .post-status code {
      font-size: 0.95rem;
      background: rgba(14, 85, 175, 0.08);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }

    @media (max-width: 1120px) {
      body {
        padding: 1rem 0.5rem 2rem;
      }

      .post-canvas,
      .post-status {
        transform: scale(calc((100vw - 1rem) / 1080));
        transform-origin: top center;
      }

      .post-caption-panel {
        width: min(1080px, calc(100vw - 1rem));
      }

      .post-shell {
        min-height: calc(1350px * ((100vw - 1rem) / 1080) + 2rem);
      }
    }
  </style>
</head>
<body>
  <div class="post-shell">
    <div id="post-root" class="post-canvas post-status" role="status" aria-live="polite">
      Cargando reseña…
    </div>
    <section id="post-caption-panel" class="post-caption-panel" hidden aria-label="Texto para Instagram">
      <div class="post-caption-panel__head">
        <h2 class="post-caption-panel__title" id="post-caption-title">Texto para la publicación en Instagram</h2>
        <button type="button" class="post-caption-panel__copy" id="post-caption-copy">Copiar</button>
      </div>
      <pre id="post-caption-text" class="post-caption-panel__text"></pre>
    </section>
    <p class="post-hint" id="post-hint">
      Post 1080 px de ancho, alto automático (máx. 1350 px) — captura la tarjeta blanca para Instagram.
      Ejemplo: <code>post.html?bookid=8628849214</code>
    </p>
  </div>
  <script type="module" src="./assets/post-page.js"></script>
</body>
</html>
