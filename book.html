<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Libro en la antibiblioteca</title>
  <link rel="icon" type="image/png" sizes="48x48" href="./assets/favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/style.css?v=2" />
  <script src="./assets/template.js" defer></script>
  <style>
    .review-page-custom .meta { color: var(--black); opacity: 0.8; font-size: 0.95rem; }
    .review-page-custom .meta-secondary { font-style: italic; }
    .review-page-custom .author { font-size: 1.4rem; font-weight: 600; margin: 0.35rem 0 0.75rem; }
    .review-page-custom .review-by { font-size: 1rem; margin: -0.35rem 0 0.8rem; opacity: 0.88; }
    .review-page-custom .cover { margin: 0.75rem 0 1rem; }
    .review-page-custom .cover img { max-width: 220px; height: auto; border-radius: 8px; border: 1px solid var(--line); }
    /* Misma tarjeta que las páginas de reseña (reviews/*.html) */
    .review-page-custom .book-summary-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1rem;
      margin-top: 1rem;
      background: var(--card);
    }
    .review-page-custom .book-summary-card .book-summary-heading {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      color: var(--black) !important;
    }
    .review-page-custom .book-summary-card .book-summary-body-p {
      margin: 0 0 0.85rem;
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--black) !important;
    }
    .review-page-custom .book-summary-card .book-summary-body-p:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body class="photos-page review-page-custom">
  <div class="wrapper">
    <a class="skip-link" href="#book-main">Saltar al contenido</a>
    <header id="header" class="photos-header">
      <div class="photos-header__bar">
        <a class="link photos-back" href="./biblioteca-noleidos.html">← Volver a Antibiblioteca</a>
        <button class="theme-button photos-theme" type="button" aria-label="Modo de visualización: Claro/Oscuro">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="moon-icon" aria-hidden="true">
            <path d="M11.3807 2.01886C9.91573 3.38768 9 5.3369 9 7.49999C9 11.6421 12.3579 15 16.5 15C18.6631 15 20.6123 14.0843 21.9811 12.6193C21.6613 17.8537 17.3149 22 12 22C6.47715 22 2 17.5228 2 12C2 6.68514 6.14629 2.33869 11.3807 2.01886Z"></path>
          </svg>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="sun-icon" aria-hidden="true">
            <path d="M12 18C8.68629 18 6 15.3137 6 12C6 8.68629 8.68629 6 12 6C15.3137 6 18 8.68629 18 12C18 15.3137 15.3137 18 12 18ZM11 1H13V4H11V1ZM11 20H13V23H11V20ZM3.51472 4.92893L4.92893 3.51472L7.05025 5.63604L5.63604 7.05025L3.51472 4.92893ZM16.9497 18.364L18.364 16.9497L20.4853 19.0711L19.0711 20.4853L16.9497 18.364ZM19.0711 3.51472L20.4853 4.92893L18.364 7.05025L16.9497 5.63604L19.0711 3.51472ZM5.63604 16.9497L7.05025 18.364L4.92893 20.4853L3.51472 19.0711L5.63604 16.9497ZM23 11V13H20V11H23ZM4 11V13H1V11H4Z"></path>
          </svg>
        </button>
      </div>
    </header>
    <main id="book-main" class="photos-main">
      <div class="container">
        <h1 id="book-title" class="title-section"></h1>
        <p id="book-author" class="author"></p>
        <p id="book-subtitle" class="review-by">Libro en la antibiblioteca de Jorge I. Zuluaga</p>
        <p id="book-cover" class="cover" hidden>
          <img id="book-cover-img" alt="" loading="lazy" decoding="async" />
        </p>
        <p id="book-ddc" class="meta" hidden></p>
        <p id="book-dcc-general" class="meta meta-secondary" hidden></p>
        <p id="book-dcc-specific" class="meta meta-secondary" hidden></p>
        <p id="book-date-added" class="meta"></p>
        <p id="book-isbn" class="meta meta-secondary"></p>
        <p id="book-purchase-place" class="meta meta-secondary"></p>
        <p id="book-purchase-price" class="meta meta-secondary"></p>
        <p id="book-review-links" class="meta" hidden></p>
        <section id="book-summary-section" class="book-summary-section" hidden aria-labelledby="book-summary-heading">
          <article class="card book-summary-card">
            <h2 id="book-summary-heading" class="book-summary-heading"></h2>
            <div id="book-summary-body" class="book-summary-body"></div>
          </article>
        </section>
        <p id="book-error" class="photo-card__error" hidden>No se encontró el libro solicitado.</p>
      </div>
    </main>
    <footer class="print-mode-target">
      <p>Jorge I. Zuluaga — <a class="link" href="./index.html">Currículum en línea</a></p>
    </footer>
  </div>
  <script src="./assets/book-page.js" type="module"></script>
</body>
</html>
