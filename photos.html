<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Fotos (prensa y conferencias) — Jorge I. Zuluaga</title>
  <meta name="description" content="Fotografías en alta resolución para conferencias, programas y prensa." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="./assets/style.css?v=2" />
  <script src="./assets/template.js" defer></script>
</head>

<body class="photos-page">
  <div class="wrapper">
    <a class="skip-link" href="#photos-main">Saltar al contenido</a>

    <header id="header" class="photos-header">
      <div class="photos-header__bar">
        <a class="link photos-back" href="./index.html">← Volver al CV</a>

              d="M11.3807 2.01886C9.91573 3.38768 9 5.3369 9 7.49999C9 11.6421 12.3579 15 16.5 15C18.6631 15 20.6123 14.0843 21.9811 12.6193C21.6613 17.8537 17.3149 22 12 22C6.47715 22 2 17.5228 2 12C2 6.68514 6.14629 2.33869 11.3807 2.01886Z">
            </path>
          </svg>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="sun-icon" aria-hidden="true">
            <path
              d="M12 18C8.68629 18 6 15.3137 6 12C6 8.68629 8.68629 6 12 6C15.3137 6 18 8.68629 18 12C18 15.3137 15.3137 18 12 18ZM11 1H13V4H11V1ZM11 20H13V23H11V20ZM3.51472 4.92893L4.92893 3.51472L7.05025 5.63604L5.63604 7.05025L3.51472 4.92893ZM16.9497 18.364L18.364 16.9497L20.4853 19.0711L19.0711 20.4853L16.9497 18.364ZM19.0711 3.51472L20.4853 4.92893L18.364 7.05025L16.9497 5.63604L19.0711 3.51472ZM5.63604 16.9497L7.05025 18.364L4.92893 20.4853L3.51472 19.0711L5.63604 16.9497ZM23 11V13H20V11H23ZM4 11V13H1V11H4Z">
            </path>
          </svg>
        </button>
      </div>
    </header>

    <main id="photos-main" class="photos-main">
      <div class="container">
        <h1 class="title-section" id="photos-page-title">Fotografías</h1>
        <p class="photos-intro" id="photos-page-intro"></p>
        <div id="photos-grid" class="photos-grid" aria-live="polite"></div>
      </div>
    </main>

    <footer class="print-mode-target">
      <p>Jorge I. Zuluaga — <a class="link" href="./index.html">Currículum en línea</a></p>
    </footer>
  </div>

  <div id="photo-lightbox" class="photo-lightbox" hidden role="dialog" aria-modal="true" aria-labelledby="photo-lightbox-title">
    <div class="photo-lightbox__backdrop" data-lightbox-close tabindex="-1"></div>
    <div class="photo-lightbox__panel">
      <button type="button" class="photo-lightbox__close" data-lightbox-close aria-label="Cerrar vista previa">×</button>
      <h2 id="photo-lightbox-title" class="visually-hidden">Vista previa</h2>
      <img class="photo-lightbox__img" src="" alt="" />
      <div class="photo-lightbox__meta" id="photo-lightbox-meta"></div>
      <div class="photo-lightbox__actions">
        <a class="link photo-lightbox__dl" id="photo-lightbox-download" href="" download="">Descargar archivo</a>
      </div>
    </div>
  </div>

  <script src="./assets/photos-page.js" type="module"></script>
</body>

</html>
