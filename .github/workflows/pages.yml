# GitHub Pages: artefacto liviano + una sola cola de deploy.
# Tras el primer push, en Settings → Pages → Source elige "GitHub Actions"
# (desactiva el workflow automático pages-build-deployment del branch).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (exclude dev-only paths)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='bin' \
            --exclude='Makefile' \
            --exclude='QUICKSTART.md' \
            --exclude='QUICKSTART.save.md' \
            --exclude='quickstart-guide.md' \
            --exclude='content/relatividad-gravitacion/figures/figures.pptx' \
            --exclude='content/relatividad-gravitacion/figures/animations/introduccion_seno (1).html' \
            --exclude='content/relatividad-gravitacion/figures/animations/introduccion_seno (2).html' \
            ./ _site/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Máximo efectivo ~10 min (límite backend de Pages).
          timeout: 600000
          reporting_interval: 10000
